services:
  postgres:
    env_file:
      - .env
    image: postgres:16-alpine
    container_name: backend-template-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-backend_template_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-backend_template_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend-template-network

  app:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-template-api
    environment:
      POSTGRES__HOST: postgres
      POSTGRES__PORT: 5432
      POSTGRES__USER: ${DB_USER:-postgres}
      POSTGRES__PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES__DB: ${DB_NAME:-backend_template_db}
      AUTH__SECRET_KEY: ${AUTH_SECRET_KEY:-your-super-secret-key-minimum-32-characters-long-for-production}
      AUTH__ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      AUTH__ACCESS_TOKEN_EXPIRE_MINUTES: ${AUTH_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      AUTH__REFRESH_TOKEN_EXPIRE_DAYS: ${AUTH_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
      - ./alembic:/app/alembic
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - backend-template-network

volumes:
  postgres_data:

networks:
  backend-template-network:
